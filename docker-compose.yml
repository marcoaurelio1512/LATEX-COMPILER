services:
  api:
    # Optional future packaging — development uses scripts/dev.sh by default.
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command: ["bash", "-lc", "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    network_mode: bridge

  compiler:
    build:
      context: ./compiler
    image: latex-local-compiler
    profiles: ["build-only"]
